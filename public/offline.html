<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <title>XFITX — 离线</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:      #CCFF00;
      --accent-glow: rgba(204,255,0,0.35);
      --accent-dim:  rgba(204,255,0,0.10);
      --bg:          #000000;
      --surface:     #0a0a0a;
      --border:      rgba(204,255,0,0.18);
      --text:        #ffffff;
      --text-muted:  rgba(255,255,255,0.45);
      --text-faint:  rgba(255,255,255,0.20);
    }

    html {
      height: 100%;
      background: var(--bg);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
                   'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* Safe area on all sides for iPhone notch / Dynamic Island */
      padding:
        max(env(safe-area-inset-top, 0px), 40px)
        max(env(safe-area-inset-right, 0px), 24px)
        max(env(safe-area-inset-bottom, 0px), 40px)
        max(env(safe-area-inset-left, 0px), 24px);
      text-align: center;
      gap: 0;
    }

    /* ── Logo ── */
    .logo {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 44px;
    }
    .logo .x   { color: var(--accent); filter: drop-shadow(0 0 12px var(--accent-glow)); }
    .logo .fit { color: var(--text); }

    /* ── Icon container ── */
    .icon-wrap {
      width: 72px;
      height: 72px;
      border-radius: 18px;
      background: var(--accent-dim);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon-wrap svg {
      width: 32px;
      height: 32px;
      stroke: var(--accent);
    }

    /* ── Copy ── */
    h1 {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
      line-height: 1.3;
    }

    .sub {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.65;
      max-width: 270px;
      margin: 0 auto 36px;
    }

    /* ── Retry button ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent);
      color: #000;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      padding: 13px 28px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.15s ease;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 0 24px var(--accent-glow);
    }
    .btn:active {
      transform: scale(0.95);
      opacity: 0.85;
    }

    /* ── Footer hint ── */
    .hint {
      margin-top: 24px;
      font-size: 11px;
      color: var(--text-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <div class="logo">
    <span class="x">X</span><span class="fit">FIT</span><span class="x">X</span>
  </div>

  <div class="icon-wrap" aria-hidden="true">
    <!-- wifi-off (Lucide icon, MIT licence) -->
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.75"
         stroke-linecap="round" stroke-linejoin="round">
      <line x1="1"  y1="1"  x2="23" y2="23"/>
      <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
      <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
      <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
      <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
      <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
      <line x1="12" y1="20" x2="12.01" y2="20"/>
    </svg>
  </div>

  <h1>当前处于离线状态</h1>
  <p class="sub">
    无法连接到网络，请检查设备 Wi-Fi 或移动数据后重试。<br>
    已访问过的页面仍可从缓存中打开。
  </p>

  <button class="btn" onclick="window.location.reload()">
    <!-- rotate-ccw (Lucide) -->
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2.5"
         stroke-linecap="round" stroke-linejoin="round">
      <polyline points="1 4 1 10 7 10"/>
      <path d="M3.51 15a9 9 0 1 0 .49-3.15"/>
    </svg>
    重新连接
  </button>

  <p class="hint">XFITX &mdash; AI 健身私人教练</p>

</body>
</html>
